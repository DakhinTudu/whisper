# Netlify: Site settings → Build & deploy, or connect repo with base directory "frontend"
[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA: React Router / client-side routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
