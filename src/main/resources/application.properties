spring.application.name=secret

# Render injects PORT; local default 8080
server.port=${PORT:8080}

# Comma-separated patterns (Spring allowedOriginPatterns). Override in Render dashboard.
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,https://*.netlify.app}
