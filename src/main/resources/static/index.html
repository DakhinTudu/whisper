<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Discovery | Find & Connect</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div id="app">
        <!-- GLOBAL HEADER -->
        <header>
            <div class="logo">Discover</div>
            <div id="myProfile" style="display: none;">
                <div class="user-avatar-mini" id="myMiniAvatar" style="width: 30px; height: 30px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold;">JD</div>
                <span id="myName" style="font-size: 0.85rem; font-weight: 600;">John</span>
                <i class="fas fa-trash-alt" id="deleteTrigger" style="margin-left: 8px; font-size: 0.8rem; color: var(--accent); cursor: pointer;"></i>
            </div>
        </header>

        <!-- DISCOVERY FEED VIEW -->
        <main id="feedView">
            <section class="hero-section" id="accountCreationHero">
                <h1>Find your next conversation</h1>
                <p style="color: var(--text-dim);">Join thousands of users chatting in real-time. Created a profile to get started.</p>
                <div class="create-account-box">
                    <input type="text" id="newUsername" placeholder="What's your name?">
                    <button class="btn-primary" id="createUserBtn">Join Now</button>
                </div>
            </section>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="feedTitle" style="font-weight: 700;">Active Profiles</h2>
                <span id="onlineCount" style="font-size: 0.8rem; color: var(--online); font-weight: bold;">0 users online</span>
            </div>

            <div class="user-grid" id="userList">
                <!-- User Cards will be injected here -->
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-dim);">
                    <i class="fas fa-search fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                    <p>Scanning for active users...</p>
                </div>
            </div>
        </main>

        <!-- PRIVATE CHAT VIEW (MOBILE OVERLAY) -->
        <div id="chatView">
            <div class="chat-header">
                <i class="fas fa-arrow-left back-btn" id="closeChat"></i>
                <div class="avatar-mini" id="chatAvatar" style="width: 40px; height: 40px; border-radius: 12px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: bold;">JD</div>
                <div style="flex: 1;">
                    <h4 id="chatName">Jane Doe</h4>
                    <p id="chatStatusText" style="font-size: 0.7rem; color: var(--online);">Online</p>
                </div>
                <div style="display: flex; gap: 15px; color: var(--text-dim);">
                    <i class="fas fa-phone"></i>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </div>

            <div class="chat-messages" id="messageContainer">
                <!-- Messages -->
            </div>

            <div id="typingIndicator" style="padding: 0 20px 5px 20px; height: 20px; font-size: 0.8rem; color: var(--typing); font-style: italic;"></div>

            <div class="chat-input-container">
                <div class="mobile-input-bar">
                    <i class="far fa-smile" style="font-size: 1.2rem; color: var(--text-dim);"></i>
                    <input type="text" id="messageInput" placeholder="Type a message...">
                    <button class="circle-send" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- STOMP & SockJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
